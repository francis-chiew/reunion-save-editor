name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish
        run: dotnet publish ReunionSaveEditor/ReunionSaveEditor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/ReunionSaveEditor.exe
